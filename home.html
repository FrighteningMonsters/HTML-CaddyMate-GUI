<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaddyMate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <button class="back-button motor-nav-button" onclick="window.location.href='motor.html'">
            <span>Motor Control</span>
        </button>
        <div class="logo-area">
            <img src="resources/logo.png" alt="CaddyMate Logo">
            <img src="resources/stylised text.svg" alt="CaddyMate" style="width: 350px; height: auto; position: relative; top: 4px;">
        </div>
        <div class="button-container">
            <button class="menu-button" onclick="window.location.href='categories.html'">
                <span><span class="icon"><img src="resources/folder.png" alt="" class="home-icon home-icon-lg"></span>Browse Categories</span>
            </button>
            <button class="menu-button" onclick="window.location.href='search.html'">
                <span><span class="icon"><img src="resources/magnifying-glass.png" alt="" class="home-icon"></span>Search Items</span>
            </button>
        </div>
    </div>
</body>
</html>
