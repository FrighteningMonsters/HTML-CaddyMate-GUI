<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items - CaddyMate</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="items.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="window.location.href='categories.html'">
                <span>← Back</span>
            </button>
            <h1 id="categoryTitle">Items</h1>
        </div>
        <div class="items-grid" id="itemsContainer">
            <div class="loading">Loading items...</div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const ITEMS_CACHE_PREFIX = 'items-cache-v2-';

        const urlParams = new URLSearchParams(window.location.search);
        const categoryId = urlParams.get('category');
        const categoryName = urlParams.get('name');

        function readCache(key) {
            const raw = sessionStorage.getItem(key);
            if (!raw) {
                return null;
            }

            try {
                return JSON.parse(raw);
            } catch (_error) {
                return null;
            }
        }

        function writeCache(key, value) {
            sessionStorage.setItem(key, JSON.stringify({
                savedAt: Date.now(),
                value
            }));
        }

        if (categoryName) {
            const emoji = getCategoryIcon(categoryName);
            document.getElementById('categoryTitle').textContent = `${emoji} ${categoryName}`;
        }

        function getCategoryIcon(categoryName) {
            const icons = {
                'Fruit & Vegetables': '🍎',
                'Bakery': '🥖',
                'Dairy & Eggs': '🥚',
                'Meat & Fish': '🥩',
                'Frozen Foods': '❄️',
                'Pantry / Dry Goods': '🥫',
                'Snacks & Sweets': '🍪',
                'Drinks': '🥤',
                'Alcohol': '🍷',
                'Household': '🧹',
                'Health & Pharmacy': '💊',
                'Personal Care': '🧴',
                'Baby & Toddler': '👶',
                'Pet Care': '🐾',
                'Deli & Prepared Foods': '🥪'
            };
            return icons[categoryName] || '📦';
        }

        function renderItems(container, items) {
            if (!Array.isArray(items) || items.length === 0) {
                container.innerHTML = '<div class="no-data">No items in this category</div>';
                return;
            }

            container.innerHTML = items.map(item => `
                <button class="item-card" data-item-name="${encodeURIComponent(item.name)}" data-item-aisle="${encodeURIComponent(item.aisle || '')}" data-item-aisle-position="${encodeURIComponent(item.aisle_position ?? '')}" data-item-x-ros="${item.x_ros != null ? encodeURIComponent(String(item.x_ros)) : ''}" data-item-y-ros="${item.y_ros != null ? encodeURIComponent(String(item.y_ros)) : ''}" data-item-yaw-ros="${item.yaw_ros != null ? encodeURIComponent(String(item.yaw_ros)) : ''}">
                    <div class="item-name">${item.name}</div>
                    ${item.aisle ? `<div class="item-aisle">Aisle ${item.aisle}</div>` : ''}
                </button>
            `).join('');
        }

        async function loadItems() {
            const container = document.getElementById('itemsContainer');

            if (!categoryId) {
                container.innerHTML = '<div class="error">No category selected</div>';
                return;
            }

            const cacheKey = `${ITEMS_CACHE_PREFIX}${categoryId}`;
            const cached = readCache(cacheKey);

            if (cached?.value) {
                renderItems(container, cached.value);
            } else {
                container.innerHTML = '<div class="loading">Loading items...</div>';
            }

            try {
                const response = await fetch(`${API_URL}/items/${categoryId}`, { cache: 'no-store' });

                if (!response.ok) {
                    throw new Error('Failed to fetch items');
                }

                const items = await response.json();
                writeCache(cacheKey, items);
                renderItems(container, items);
            } catch (error) {
                console.error('Error loading items:', error);
                if (!cached?.value) {
                    container.innerHTML = '<div class="error">Failed to load items. Please try again.</div>';
                }
            }
        }

        function openItemOnMap(itemName, aisle, aislePosition, xRos, yRos, yawRos) {
            const payload = {
                item: itemName || '',
                aisle: aisle || '',
                aisle_position: aislePosition || '',
                x_ros: xRos,
                y_ros: yRos,
                yaw_ros: yawRos
            };

            sessionStorage.setItem('mapTarget', JSON.stringify(payload));

            const query = new URLSearchParams({
                item: itemName || '',
                aisle: aisle || '',
                aisle_position: aislePosition || ''
            });
            if (xRos != null && xRos !== '' && !isNaN(parseFloat(xRos))) {
                query.set('x_ros', String(xRos));
            }
            if (yRos != null && yRos !== '' && !isNaN(parseFloat(yRos))) {
                query.set('y_ros', String(yRos));
            }
            if (yawRos != null && yawRos !== '' && !isNaN(parseFloat(yawRos))) {
                query.set('yaw_ros', String(yawRos));
            }

            window.location.href = `map.html?${query.toString()}`;
        }

        document.getElementById('itemsContainer').addEventListener('click', (event) => {
            const card = event.target.closest('.item-card');
            if (!card) {
                return;
            }

            const itemName = decodeURIComponent(card.dataset.itemName || '');
            const aisle = decodeURIComponent(card.dataset.itemAisle || '');
            const aislePosition = decodeURIComponent(card.dataset.itemAislePosition || '');
            const xRos = card.dataset.itemXRos != null && card.dataset.itemXRos !== '' ? card.dataset.itemXRos : null;
            const yRos = card.dataset.itemYRos != null && card.dataset.itemYRos !== '' ? card.dataset.itemYRos : null;
            const yawRos = card.dataset.itemYawRos != null && card.dataset.itemYawRos !== '' ? card.dataset.itemYawRos : null;
            openItemOnMap(itemName, aisle, aislePosition, xRos, yRos, yawRos);
        });

        loadItems();
    </script>
</body>
</html>
